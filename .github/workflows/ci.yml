name: CI Pipeline — Lint, Test, Validate

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  quality-checks:
    name: Code Quality + Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check code format (black)
      run: black --check src/ tests/ --line-length 100

    - name: Lint code (flake8)
      run: flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503

    - name: Run unit tests (pytest)
      run: pytest tests/ -v --tb=short

    - name: Schema smoke test
      run: |
        python -c "
        import pandera as pa
        print('Pandera loaded ✅')
        print('Schema validation available ✅')
        "
